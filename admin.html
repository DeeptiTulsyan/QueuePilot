<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | QueuePilot</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">QueuePilot</h2>

    <nav>
      <ul>
        <li class="active">Dashboard</li>
        <li>Users</li>
        <li>Queues</li>
        <li>Settings</li>
        <li class="logout">Logout</li>
      </ul>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <h1>Admin Dashboard</h1>
      <div class="admin-info">
        <span>Admin</span>
        <img src="img/admin-avatar.jpg" alt="Admin avatar">
      </div>
    </header>

    <!-- CONTENT -->
    <section class="content">

      <!-- STATS -->
      <div class="stats">
        <div class="card">
          <h3>Total Users</h3>
          <p>1,240</p>
        </div>

        <div class="card">
          <h3>Active Queues</h3>
          <p>38</p>
        </div>

        <div class="card">
          <h3>Today’s Check-ins</h3>
          <p>412</p>
        </div>
      </div>
<!-- TOKEN MANAGEMENT -->
<div class="panel">
  <h2>Queue Tokens</h2>

  <ul id="token-list"></ul>

  <button id="serve-token">Serve Next Token</button>
</div>
      <!-- PLACEHOLDER SECTION -->
      <div class="panel">
        <h2>Recent Activity</h2>
        <p>This section will later show logs, tables, or charts.</p>
      </div>

    </section>

  </main>

</div>
<script src="js/admin.js"></script>

</body>
</html>
