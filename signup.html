<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign Up | QueuePilot</title>
  <meta name="description" content="Create your QueuePilot account to manage queues efficiently.">

  <link rel="stylesheet" href="css/signup.css">
</head>
<body>

<main class="signup-container">

  <!-- LEFT: IMAGE (decorative) -->
  <section class="signup-visual" aria-hidden="true">
    <img src="img/signup_image.png" alt="">
  </section>

  <!-- RIGHT: FORM -->
  <section class="signup-form">
    <h1>Create Account</h1>
    <p>Get started with QueuePilot</p>

    <form id="signup-form" novalidate>

      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" required minlength="3">
        <span class="error" id="name-error" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" required>
        <span class="error" id="email-error" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6">
        <span class="error" id="password-error" aria-live="polite"></span>
      </div>

      <button type="submit">Create Account</button>

      <p class="form-footer">
        Already have an account?
        <a href="signin.html">Sign In</a>
      </p>

    </form>
  </section>

</main>

<script src="js/signup.js"></script>
</body>
</html>
