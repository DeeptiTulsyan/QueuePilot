<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard | QueuePilot</title>
  <link rel="stylesheet" href="css/user.css" />
</head>
<body>

<header class="topbar">
  <div class="logo">QueuePilot</div>

  <nav aria-label="User navigation">
    <a href="#">Dashboard</a>
    <a href="#">Profile</a>
    <a href="#" class="logout">Logout</a>
  </nav>
</header>

<main class="dashboard">

  <!-- WELCOME -->
  <section class="welcome">
    <h1>Welcome, <span id="username">Deepti</span> 👋</h1>
    <p>Your queue status is shown below</p>
  </section>

  <!-- STATUS CARDS -->
  <section class="status-grid">

    <article class="status-card">
      <h3>Your Token</h3>
      <p class="big" id="token-number">A-17</p>
    </article>

    <article class="status-card">
      <h3>Estimated Wait</h3>
      <p class="big"><span id="eta">25</span> mins</p>
    </article>

    <article class="status-card">
      <h3>People Ahead</h3>
      <p class="big" id="people-ahead">4</p>
    </article>

  </section>

  <!-- QUEUE DETAILS -->
  <section class="queue-details">
    <h2>Queue Information</h2>

    <ul>
      <li><strong>Department:</strong> General Medicine</li>
      <li><strong>Doctor:</strong> Dr. Sharma</li>
      <li>
        <strong>Status:</strong>
        <span id="queue-status">Waiting</span>
      </li>
    </ul>
  </section>

  <!-- ACTIONS -->
  <section class="actions">
    <button class="secondary" id="refresh-btn">Refresh Status</button>
    <button class="danger" id="cancel-btn">Cancel Token</button>
    <button id="generate-token" class="secondary">Join Queue</button>

  </section>

</main>

<footer class="footer">
  <p>© 2025 QueuePilot</p>
</footer>

<script src="js/user.js"></script>
</body>
</html>
